<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Panel — Abhinav Hosting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/theme/dracula.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/mode/python/python.min.js"></script>

  <style>
    :root {
      --bg:#010103; --surface:#0a0a0f; --surface2:#0f0f16;
      --accent:#00e5a0; --accent-dim:rgba(0,229,160,0.1); --accent-border:rgba(0,229,160,0.22);
      --red:#ff3b5c; --red-dim:rgba(255,59,92,0.1); --red-border:rgba(255,59,92,0.25);
      --yellow:#f59e0b; --yellow-dim:rgba(245,158,11,0.1); --yellow-border:rgba(245,158,11,0.25);
      --border:rgba(255,255,255,0.05); --border2:rgba(255,255,255,0.03);
      --text:#c9d1d9; --muted:#4a5568; --green:#00e5a0;
      --mono:'JetBrains Mono',monospace;
      --terminal-bg:#06060a;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
    body {
      font-family:'Space Grotesk',sans-serif; background:var(--bg);
      color:var(--text); min-height:100vh; overflow-x:hidden;
    }

    /* Scanlines + grid */
    body::before { content:''; position:fixed; inset:0; z-index:0; pointer-events:none; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px); }
    body::after  { content:''; position:fixed; inset:0; z-index:0; pointer-events:none; background-image:linear-gradient(rgba(0,229,160,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.02) 1px,transparent 1px); background-size:40px 40px; }

    /* Topbar */
    .topbar {
      display:flex; justify-content:space-between; align-items:center;
      padding:10px 16px; position:sticky; top:0; z-index:1000;
      background:rgba(1,1,3,0.95); backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
    }
    .logo { font-family:var(--mono); font-size:12px; font-weight:700; color:var(--accent); display:flex; align-items:center; gap:7px; letter-spacing:1px; }
    .logo-dot { width:7px; height:7px; background:var(--accent); border-radius:50%; box-shadow:0 0 6px var(--accent); animation:blink 2s infinite; flex-shrink:0; }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    .btn-icon { background:transparent; border:1px solid var(--border); color:var(--muted); width:32px; height:32px; border-radius:7px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:0.2s; font-size:12px; }
    .btn-icon:hover { color:var(--text); border-color:rgba(255,255,255,0.12); }

    /* Container */
    .container { padding:14px 14px; max-width:700px; margin:auto; position:relative; z-index:1; }

    /* Section label */
    .sec-label { font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:6px; }

    /* Server cards */
    .srv-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:10px; padding:13px 15px; margin-bottom:8px;
      display:flex; justify-content:space-between; align-items:center;
      transition:0.2s; cursor:pointer;
    }
    .srv-card:hover { border-color:var(--accent-border); background:var(--surface2); }
    .srv-name { font-size:14px; font-weight:600; color:#fff; }
    .srv-folder { font-family:var(--mono); font-size:10px; color:var(--muted); margin-top:2px; }
    .status-badge { font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:0.5px; padding:3px 8px; border-radius:4px; display:flex; align-items:center; gap:5px; }
    .status-online { background:rgba(0,229,160,0.1); color:var(--accent); border:1px solid rgba(0,229,160,0.2); }
    .status-offline { background:rgba(255,255,255,0.04); color:var(--muted); border:1px solid var(--border); }
    .status-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
    .s-online { background:var(--accent); box-shadow:0 0 5px var(--accent); animation:blink 2s infinite; }
    .s-offline { background:var(--muted); }
    .stat-chip { font-family:var(--mono); font-size:9px; color:var(--muted); background:var(--surface2); border:1px solid var(--border2); padding:2px 7px; border-radius:4px; }

    /* Buttons */
    .action-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:8px; }
    .btn {
      padding:10px 12px; border-radius:8px; border:1px solid; font-weight:600;
      cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
      font-size:11px; font-family:var(--mono); transition:0.15s; letter-spacing:0.3px;
    }
    .btn:active { transform:scale(0.97); }
    .btn-green { background:var(--accent-dim); color:var(--accent); border-color:var(--accent-border); }
    .btn-green:hover { background:rgba(0,229,160,0.18); }
    .btn-dark  { background:rgba(255,255,255,0.03); color:var(--text); border-color:var(--border); }
    .btn-dark:hover  { border-color:rgba(255,255,255,0.12); }
    .btn-red   { background:var(--red-dim); color:var(--red); border-color:var(--red-border); }
    .btn-red:hover   { background:rgba(255,59,92,0.18); }
    .btn-yellow { background:var(--yellow-dim); color:var(--yellow); border-color:var(--yellow-border); }
    .btn-full { width:100%; }

    /* Terminal */
    .terminal-wrap { background:var(--terminal-bg); border-radius:10px; border:1px solid var(--border); overflow:hidden; margin-bottom:10px; }
    .terminal-header { background:rgba(10,10,16,0.9); padding:8px 14px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .terminal-label { font-family:var(--mono); font-size:9px; color:var(--muted); letter-spacing:1px; display:flex; align-items:center; gap:7px; text-transform:uppercase; }
    .tdots { display:flex; gap:4px; }
    .tdots span { width:8px; height:8px; border-radius:50%; }
    #console { height:240px; padding:12px 14px; overflow-y:auto; font-family:var(--mono); font-size:11px; line-height:1.7; color:#7c8fa6; }
    #console::-webkit-scrollbar { width:3px; }
    #console::-webkit-scrollbar-track { background:transparent; }
    #console::-webkit-scrollbar-thumb { background:#1a1a2e; border-radius:3px; }
    .log-line { margin-bottom:0; }
    .terminal-input { background:rgba(0,0,0,0.5); padding:9px 14px; border-top:1px solid var(--border); display:flex; align-items:center; gap:8px; }
    .terminal-input span { color:var(--accent); font-family:var(--mono); font-weight:700; font-size:12px; }
    .terminal-input input { background:transparent; border:none; color:var(--accent); flex:1; font-family:var(--mono); font-size:12px; outline:none; }

    /* File manager */
    .fm-wrap { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    .fm-header { padding:11px 14px; background:rgba(255,255,255,0.02); border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    .fm-label { font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }
    .fm-actions { display:flex; gap:6px; }
    .btn-sm { padding:5px 11px; font-size:10px; border-radius:6px; border:1px solid var(--border); font-family:var(--mono); font-weight:600; cursor:pointer; display:flex; align-items:center; gap:5px; transition:0.15s; background:transparent; color:var(--muted); letter-spacing:0.3px; }
    .btn-sm:hover { color:var(--accent); border-color:var(--accent-border); }

    .breadcrumb { padding:7px 14px; font-family:var(--mono); font-size:10px; color:var(--muted); border-bottom:1px solid var(--border2); display:flex; align-items:center; gap:4px; flex-wrap:wrap; }
    .bc-item { cursor:pointer; color:var(--accent); transition:0.15s; }
    .bc-item:hover { text-decoration:underline; }

    .file-item { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; border-bottom:1px solid var(--border2); transition:0.12s; }
    .file-item:last-child { border-bottom:none; }
    .file-item:hover { background:rgba(255,255,255,0.02); }
    .file-name { display:flex; align-items:center; gap:9px; font-family:var(--mono); font-size:12px; }
    .file-name i { color:var(--muted); width:14px; text-align:center; font-size:11px; }
    .file-name i.fa-folder { color:var(--yellow); }
    .file-name i.fa-file-code { color:#7c8fa6; }
    .fmenu { color:var(--muted); padding:3px 7px; border-radius:5px; transition:0.12s; font-size:12px; cursor:pointer; }
    .fmenu:hover { color:var(--accent); background:rgba(0,229,160,0.07); }

    /* Context menu */
    .menu-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); display:none; z-index:5000; align-items:flex-end; justify-content:center; backdrop-filter:blur(6px); padding-bottom:16px; }
    .menu-sheet { background:#0a0a12; border:1px solid var(--border); border-radius:14px; width:calc(100% - 28px); max-width:380px; overflow:hidden; }
    .menu-label { font-family:var(--mono); font-size:9px; color:var(--muted); padding:10px 16px 6px; letter-spacing:1px; text-transform:uppercase; border-bottom:1px solid var(--border); }
    .menu-item { padding:13px 16px; color:var(--text); cursor:pointer; display:flex; align-items:center; gap:11px; border-bottom:1px solid var(--border2); font-size:13px; font-weight:500; transition:0.12s; }
    .menu-item:last-child { border-bottom:none; }
    .menu-item:hover { background:rgba(255,255,255,0.03); }
    .menu-item i { width:15px; text-align:center; font-size:12px; color:var(--muted); }
    .menu-item.danger { color:var(--red); }
    .menu-item.danger i { color:var(--red); }

    /* Editor */
    #editor { display:none; position:fixed; inset:0; background:var(--bg); z-index:6000; padding:14px; flex-direction:column; }
    #editor.open { display:flex; }
    .editor-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .editor-fname { font-family:var(--mono); font-size:11px; color:var(--muted); }
    .editor-actions { display:flex; gap:8px; }
    .CodeMirror { height:calc(100vh - 76px); border-radius:10px; font-size:12px; font-family:var(--mono) !important; }

    /* Empty state */
    .empty { text-align:center; padding:40px 20px; }
    .empty i { font-size:24px; color:var(--muted); opacity:0.4; margin-bottom:10px; display:block; }
    .empty p { font-family:var(--mono); font-size:11px; color:var(--muted); }

    /* Create btn */
    .btn-create { background:var(--accent-dim); border:1px solid var(--accent-border); color:var(--accent); padding:8px 16px; border-radius:8px; font-family:var(--mono); font-size:11px; font-weight:700; cursor:pointer; display:flex; align-items:center; gap:6px; transition:0.15s; letter-spacing:0.3px; }
    .btn-create:hover { background:rgba(0,229,160,0.18); }

    /* Uptime badge */
    .uptime-tag { font-family:var(--mono); font-size:10px; color:var(--muted); background:var(--surface); border:1px solid var(--border); padding:5px 11px; border-radius:6px; }

    /* Custom Modal */
    .m-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px; }
    .m-box { background:#0a0a0f;border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:24px;width:100%;max-width:340px; }
    .m-title { font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent);letter-spacing:0.5px;margin-bottom:16px; }
    .m-text { font-size:13px;color:var(--muted);margin-bottom:16px; }
    .m-input { width:100%;background:#0f0f16;border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:var(--text);padding:10px 12px;font-family:var(--mono);font-size:13px;outline:none;transition:border 0.15s; }
    .m-input:focus { border-color:var(--accent-border); }
    .m-actions { display:flex;gap:8px;justify-content:flex-end;margin-top:18px; }
    .m-btn { padding:12px 20px;border-radius:8px;font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer;border:none;transition:0.15s;min-height:44px; }
    .m-btn-cancel { background:rgba(255,255,255,0.05);color:var(--muted); }
    .m-btn-ok { background:var(--accent-dim);border:1px solid var(--accent-border);color:var(--accent); }
    .m-btn-ok:active { background:rgba(0,229,160,0.22); }
    .m-btn-del { background:var(--red-dim);border:1px solid var(--red-border);color:var(--red); }

    /* Toast */
    .toast { position:fixed;top:16px;right:16px;z-index:99999;background:#0a0a12;border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:10px 16px;font-family:var(--mono);font-size:12px;display:flex;align-items:center;gap:8px;transform:translateY(-80px);opacity:0;transition:0.25s;max-width:260px; }
    .toast.show { transform:translateY(0);opacity:1; }
    .toast.success { border-color:var(--accent-border);color:var(--accent); }
    .toast.error { border-color:var(--red-border);color:var(--red); }
    .toast.info { border-color:var(--yellow-border);color:var(--yellow); }
  </style>
</head>
<body>
  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Custom Modal -->
  <div class="m-overlay" id="mOverlay" onclick="mClickOutside(event)" style="display:none">
    <div class="m-box" id="mBox">
      <div class="m-title" id="mTitle"></div>
      <div class="m-text" id="mText" style="display:none"></div>
      <input class="m-input" id="mInput" style="display:none" autocomplete="off" autocorrect="off" spellcheck="false">
      <div class="m-actions">
        <button class="m-btn m-btn-cancel" id="mCancel" onclick="mResolve(null)">CANCEL</button>
        <button class="m-btn m-btn-ok" id="mOk">OK</button>
      </div>
    </div>
  </div>

  <!-- Topbar -->
  <div class="topbar">
    <div class="logo"><div class="logo-dot"></div>ABHINAV_HOST</div>
    <div style="display:flex;gap:7px;">
      <div class="btn-icon" onclick="location.href='/logout'" title="Logout"><i class="fas fa-sign-out-alt"></i></div>
    </div>
  </div>

  <!-- Home View -->
  <div class="container" id="homeView">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div class="sec-label">// INSTANCES</div>
      <button class="btn-create" onclick="createServer()"><i class="fas fa-plus" style="font-size:9px;"></i> NEW</button>
    </div>
    <div id="srvList"></div>
  </div>

  <!-- Manage View -->
  <div class="container" id="manageView" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <button class="btn btn-dark" style="padding:7px 13px;" onclick="location.reload()">
        <i class="fas fa-arrow-left" style="font-size:10px;margin-right:2px;"></i> back
      </button>
      <div class="uptime-tag" id="vUptime">OFFLINE</div>
    </div>

    <div class="action-row">
      <button class="btn btn-green" onclick="srvAction('start')"><i class="fas fa-play" style="font-size:9px;"></i> START</button>
      <button class="btn btn-dark" onclick="srvAction('restart')"><i class="fas fa-rotate-right" style="font-size:9px;"></i> RESTART</button>
      <button class="btn btn-red" onclick="srvAction('stop')"><i class="fas fa-stop" style="font-size:9px;"></i> STOP</button>
    </div>
    <button class="btn btn-yellow btn-full" style="margin:8px 0;" onclick="installPackages()">
      <i class="fas fa-box-open" style="font-size:9px;"></i> INSTALL PACKAGES
    </button>

    <div class="terminal-wrap">
      <div class="terminal-header">
        <div class="terminal-label">
          <div class="tdots">
            <span style="background:#ff3b5c;"></span>
            <span style="background:#f59e0b;"></span>
            <span style="background:#00e5a0;"></span>
          </div>
          terminal
        </div>
        <span id="vSrvName" style="font-family:var(--mono);font-size:10px;color:var(--accent);">-</span>
      </div>
      <div id="console"></div>
      <div class="terminal-input">
        <span>$</span>
        <input type="text" id="termCmd" placeholder="enter command..." onkeydown="if(event.key==='Enter') sendCmd()">
      </div>
    </div>

    <div class="fm-wrap">
      <div class="fm-header">
        <span class="fm-label">file manager</span>
        <div class="fm-actions">
          <button class="btn-sm" onclick="document.getElementById('fUp').click()"><i class="fas fa-upload"></i> upload</button>
          <button class="btn-sm" onclick="createNew('file')"><i class="fas fa-plus"></i> new</button>
          <input type="file" id="fUp" hidden multiple onchange="uploadFile(this)">
        </div>
      </div>
      <div class="breadcrumb" id="breadcrumb">
        <span class="bc-item" onclick="goRoot()">~/root</span>
      </div>
      <div id="fileList"></div>
    </div>
  </div>

  <!-- Context Menu -->
  <div class="menu-overlay" id="menuOverlay" onclick="this.style.display='none'">
    <div class="menu-sheet" onclick="event.stopPropagation()">
      <div class="menu-label">file options</div>
      <div class="menu-item" id="btnEdit"><i class="fas fa-pen"></i> Edit</div>
      <div class="menu-item" id="btnRename"><i class="fas fa-i-cursor"></i> Rename</div>
      <div class="menu-item" id="btnZip"><i class="fas fa-file-zipper"></i> Archive</div>
      <div class="menu-item" id="btnUnzip"><i class="fas fa-box-open"></i> Extract</div>
      <div class="menu-item danger" id="btnDelete"><i class="fas fa-trash"></i> Delete</div>
    </div>
  </div>

  <!-- Editor -->
  <div id="editor">
    <div class="editor-head">
      <span class="editor-fname" id="edFile"></span>
      <div class="editor-actions">
        <button class="btn btn-dark" style="padding:7px 13px;font-size:11px;" onclick="closeEditor()">close</button>
        <button class="btn btn-green" style="padding:7px 13px;font-size:11px;" onclick="saveFile()"><i class="fas fa-save" style="font-size:10px;"></i> save</button>
      </div>
    </div>
    <textarea id="edText"></textarea>
  </div>

  <script>
    let curSrv=null, logItv=null, currentSubPath='', editorInstance=null, pathParts=[];

    async function loadSrv() {
      const r = await fetch('/servers'); const d = await r.json();
      const el = document.getElementById('srvList');
      if(!d.servers.length) {
        el.innerHTML=`<div class="empty"><i class="fas fa-server"></i><p>// no instances found</p></div>`; return;
      }
      el.innerHTML = d.servers.map(s=>`
        <div class="srv-card" onclick='openSrv(${JSON.stringify(s)})'>
          <div>
            <div class="srv-name">${s.name}</div>
            <div class="srv-folder">${s.folder}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
            <div class="status-badge ${s.online?'status-online':'status-offline'}">
              <span class="status-dot ${s.online?'s-online':'s-offline'}"></span>
              ${s.online?'RUNNING':'OFFLINE'}
            </div>
            <div style="display:flex;gap:4px;">
              <span class="stat-chip">${s.cpu}</span>
              <span class="stat-chip">${s.ram}</span>
            </div>
          </div>
        </div>`).join('');
    }

    function openSrv(s) {
      curSrv=s; pathParts=[];
      document.getElementById('homeView').style.display='none';
      document.getElementById('manageView').style.display='block';
      document.getElementById('vSrvName').innerText=s.name;
      loadFiles(); startLogs();
    }

    function goRoot() { currentSubPath=''; pathParts=[]; loadFiles(); }

    function updateBreadcrumb() {
      const bc=document.getElementById('breadcrumb');
      let html=`<span class="bc-item" onclick="goRoot()">~/root</span>`;
      let cum='';
      pathParts.forEach((p,i)=>{
        html+=` <span style="color:var(--muted);">/</span> `;
        cum+=(i===0?'':'/')+p;
        const cp=cum;
        html+=`<span class="bc-item" onclick="jumpTo('${cp}')">${p}</span>`;
      });
      bc.innerHTML=html;
    }
    function jumpTo(path) { currentSubPath=path; pathParts=path.split('/').filter(Boolean); loadFiles(); }

    async function loadFiles() {
      updateBreadcrumb();
      const r=await fetch(`/files/list/${curSrv.folder}?path=${currentSubPath}`); const d=await r.json();
      const el=document.getElementById('fileList');
      if(!d.length){ el.innerHTML=`<div class="empty" style="padding:20px;"><i class="fas fa-folder-open"></i><p>// empty</p></div>`; return; }
      el.innerHTML=d.map(f=>`
        <div class="file-item" onclick="${f.is_dir?`enterFolder('${f.name}')`:''}" >
          <div class="file-name">
            <i class="fas ${f.is_dir?'fa-folder':'fa-file-code'}"></i>
            <span>${f.name}</span>
          </div>
          <i class="fas fa-ellipsis-vertical fmenu" onclick="event.stopPropagation();openMenu('${f.name}',${f.is_zip},${f.is_dir})"></i>
        </div>`).join('');
    }

    function enterFolder(n) { currentSubPath+=(currentSubPath===''?'':'/')+n; pathParts.push(n); loadFiles(); }

    function openMenu(name,isZip,isDir) {
      document.getElementById('btnEdit').style.display=isDir?'none':'flex';
      document.getElementById('btnUnzip').style.display=isZip?'flex':'none';
      document.getElementById('btnZip').style.display=isDir?'none':'flex';
      document.getElementById('btnEdit').onclick=()=>{closeMenu();editFile(name);};
      document.getElementById('btnUnzip').onclick=()=>{closeMenu();unzipAction(name);};
      document.getElementById('btnDelete').onclick=()=>{closeMenu();deleteFile(name);};
      document.getElementById('btnRename').onclick=()=>{closeMenu();renameFile(name);};
      document.getElementById('btnZip').onclick=()=>{closeMenu();zipFile(name);};
      document.getElementById('menuOverlay').style.display='flex';
    }
    function closeMenu() { document.getElementById('menuOverlay').style.display='none'; }

    async function srvAction(a) {
      await fetch(`/server/action/${curSrv.folder}/${a}`,{method:'POST'});
      notify(a.toUpperCase(),'success');
    }

    async function installPackages() {
      const res=await fetch(`/server/action/${curSrv.folder}/install`,{method:'POST'});
      const d=await res.json();
      if(d.status==='error') alert(d.msg); else notify('Installing...','info');
    }

    async function createServer() {
      const n=await mPrompt('NEW INSTANCE','mybot');
      if(n){ await fetch('/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n})}); loadSrv(); }
    }

    async function editFile(n) {
      const res=await fetch(`/files/content/${curSrv.folder}/${encodeURIComponent(n)}?path=${encodeURIComponent(currentSubPath)}`);
      const data=await res.json();
      document.getElementById('edFile').innerText=n;
      document.getElementById('editor').classList.add('open');
      if(!editorInstance) editorInstance=CodeMirror.fromTextArea(document.getElementById('edText'),{mode:'python',theme:'dracula',lineNumbers:true,lineWrapping:true});
      editorInstance.setValue(data.content||'');
      setTimeout(()=>editorInstance.refresh(),50);
    }

    async function saveFile() {
      const n=document.getElementById('edFile').innerText;
      await fetch(`/files/save/${curSrv.folder}/${encodeURIComponent(n)}?path=${encodeURIComponent(currentSubPath)}`,
        {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:editorInstance.getValue()})});
      closeEditor(); notify('SAVED','success');
    }
    function closeEditor() { document.getElementById('editor').classList.remove('open'); }

    async function renameFile(o) {
      const nv=await mPrompt('RENAME',o,o);
      if(nv&&nv!==o){
        const res=await fetch(`/files/rename/${curSrv.folder}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({old:o,new:nv,path:currentSubPath})});
        const d=await res.json(); if(d.status==='success'){loadFiles();notify('RENAMED','success');}
      }
    }

    async function zipFile(name) {
      const res=await fetch(`/files/zip-bulk/${curSrv.folder}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({names:[name],path:currentSubPath})});
      const d=await res.json(); if(d.status==='success'){loadFiles();notify('ARCHIVED','success');}
    }

    async function unzipAction(name) {
      const res=await fetch(`/files/unzip/${curSrv.folder}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,path:currentSubPath})});
      const d=await res.json(); if(d.status==='success'){loadFiles();notify('EXTRACTED','success');}
      else alert(d.msg);
    }

    async function uploadFile(input) {
      if(!input.files.length) return;
      if(!curSrv){ notify('SELECT A SERVER FIRST','error'); return; }
      const files=Array.from(input.files);
      let ok=0, fail=0;
      for(const file of files){
        try{
          let fd=new FormData(); fd.append('file',file); fd.append('path',currentSubPath);
          const res=await fetch(`/files/upload/${curSrv.folder}`,{method:'POST',body:fd});
          if(res.ok) ok++; else fail++;
        } catch(e){ fail++; }
      }
      input.value='';
      await loadFiles();
      if(fail===0) notify(`${ok} FILE(S) UPLOADED`,'success');
      else notify(`${ok} uploaded, ${fail} FAILED`,'error');
    }

    async function createNew(type) {
      const n=await mPrompt('NEW '+type.toUpperCase(),'name...');
      if(n){
        const url=type==='file'?`/files/create-file/${curSrv.folder}`:`/files/create-folder/${curSrv.folder}`;
        await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,path:currentSubPath})});
        loadFiles();
      }
    }

    async function deleteFile(n) {
      const res=await mConfirm('DELETE FILE?',n,true);
      if(res){
        await fetch(`/files/delete-bulk/${curSrv.folder}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({names:[n],path:currentSubPath})});
        loadFiles();
      }
    }

    function sendCmd() {
      const cmd=document.getElementById('termCmd').value.trim();
      if(cmd){ fetch(`/server/command/${curSrv.folder}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({command:cmd})}); document.getElementById('termCmd').value=''; }
    }

    function startLogs() {
      if(logItv) clearInterval(logItv);
      logItv=setInterval(async()=>{
        if(!curSrv) return;
        const r=await fetch(`/server/log/${curSrv.folder}`); const d=await r.json();
        const c=document.getElementById('console');
        if(d.log&&d.log!==c.getAttribute('data-raw')){
          c.setAttribute('data-raw',d.log);
          c.innerHTML=d.log.split('\n').map(l=>l.trim()?`<div class="log-line">${esc(l)}</div>`:'').join('');
          c.scrollTop=c.scrollHeight;
        }
        const sr=await fetch('/servers'); const sd=await sr.json();
        const srv=sd.servers.find(s=>s.folder===curSrv.folder);
        if(srv){
          const el=document.getElementById('vUptime');
          el.innerText=srv.online?'UP: '+srv.uptime:'OFFLINE';
          el.style.color=srv.online?'var(--accent)':'var(--muted)';
        }
      },2000);
    }

    function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

    /* ── Modal system ── */
    let _mResolve=null, _mPrevFocus=null;

    function mResolve(v){
      if(_mResolve){_mResolve(v);_mResolve=null;}
      _mHide();
      if(_mPrevFocus){_mPrevFocus.focus();_mPrevFocus=null;}
    }

    function _mShow(){
      _mPrevFocus=document.activeElement;
      document.getElementById('mOverlay').style.display='flex';
    }

    function _mHide(){
      document.getElementById('mOverlay').style.display='none';
      document.removeEventListener('keydown',_mKeyHandler);
    }

    let _mKeyHandler=null;
    function _addKeyHandler(onEnter){
      document.removeEventListener('keydown',_mKeyHandler);
      _mKeyHandler=e=>{
        if(e.key==='Enter'){ e.preventDefault(); onEnter(); }
        else if(e.key==='Escape'){ e.preventDefault(); mResolve(null); }
      };
      document.addEventListener('keydown',_mKeyHandler);
    }

    function mClickOutside(e){ if(e.target===document.getElementById('mOverlay')) mResolve(null); }

    function mPrompt(title, placeholder='', defaultVal=''){
      return new Promise(res=>{
        _mResolve=res;
        document.getElementById('mTitle').innerText=title;
        document.getElementById('mText').style.display='none';
        const inp=document.getElementById('mInput');
        inp.style.display='block'; inp.placeholder=placeholder; inp.value=defaultVal;
        const ok=document.getElementById('mOk');
        ok.className='m-btn m-btn-ok'; ok.innerText='OK';
        const submit=()=>{ const v=inp.value.trim(); if(v) mResolve(v); };
        ok.onclick=submit;
        _addKeyHandler(submit);
        document.getElementById('mCancel').style.display='';
        _mShow();
        setTimeout(()=>inp.focus(),220);
      });
    }

    function mConfirm(title, text='', danger=false){
      return new Promise(res=>{
        _mResolve=res;
        document.getElementById('mTitle').innerText=title;
        const txt=document.getElementById('mText');
        txt.style.display=text?'block':'none'; txt.innerText=text;
        document.getElementById('mInput').style.display='none';
        const ok=document.getElementById('mOk');
        ok.className='m-btn '+(danger?'m-btn-del':'m-btn-ok'); ok.innerText=danger?'DELETE':'OK';
        const submit=()=>mResolve(true);
        ok.onclick=submit;
        _addKeyHandler(submit);
        document.getElementById('mCancel').style.display='';
        _mShow();
        setTimeout(()=>ok.focus(),220);
      });
    }

    function notify(t,type='success'){
      const el=document.getElementById('toast');
      el.className='toast '+type;
      const icon=type==='success'?'✓':type==='error'?'✗':'●';
      el.innerHTML=`<span>${icon}</span><span>${t}</span>`;
      el.classList.add('show');
      clearTimeout(el._t);
      el._t=setTimeout(()=>el.classList.remove('show'),2000);
    }

    document.addEventListener('DOMContentLoaded',loadSrv);
  </script>
</body>
</html>
