<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0">
    <title>Access — Abhinav Hosting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg:#010103; --surface:#0a0a0f; --accent:#00e5a0;
            --accent-dim:rgba(0,229,160,0.1); --accent-border:rgba(0,229,160,0.22);
            --border:rgba(255,255,255,0.06); --muted:#4a5568;
            --text:#c9d1d9; --mono:'JetBrains Mono',monospace;
        }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body {
            font-family:'Space Grotesk',sans-serif; background:var(--bg);
            min-height:100dvh; display:flex; align-items:center; justify-content:center;
            color:var(--text); position:relative; overflow:hidden;
        }
        body::before { content:''; position:fixed; inset:0; z-index:0; pointer-events:none; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px); }
        body::after  { content:''; position:fixed; inset:0; z-index:0; pointer-events:none; background-image:linear-gradient(rgba(0,229,160,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.025) 1px,transparent 1px); background-size:40px 40px; }
        .glow { position:fixed; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle,rgba(0,229,160,0.05) 0%,transparent 70%); top:-150px; right:-150px; pointer-events:none; z-index:0; }

        .card {
            position:relative; z-index:10;
            width:92%; max-width:360px;
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:12px; padding:30px 24px;
            box-shadow:0 0 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(0,229,160,0.04) inset;
        }

        .card-header { margin-bottom:24px; }
        .sys-label { font-family:var(--mono); font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
        .sys-label::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 6px var(--accent); display:inline-block; animation:blink 2s infinite; }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        h1 { font-family:var(--mono); font-size:18px; font-weight:700; color:#fff; letter-spacing:-0.3px; }
        .sub { font-family:var(--mono); font-size:10px; color:var(--muted); margin-top:4px; }

        .field { margin-bottom:12px; }
        .field label { font-family:var(--mono); font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; display:block; margin-bottom:6px; }
        .field input {
            width:100%; padding:11px 14px;
            background:rgba(255,255,255,0.03); border:1px solid var(--border);
            border-radius:7px; color:var(--text); font-size:13px;
            font-family:var(--mono); outline:none; transition:0.2s;
        }
        .field input::placeholder { color:var(--muted); }
        .field input:focus { border-color:var(--accent-border); background:rgba(0,229,160,0.04); box-shadow:0 0 0 3px rgba(0,229,160,0.08); }

        .pass-wrap { position:relative; }
        .pass-wrap input { padding-right:38px; }
        .pass-eye { position:absolute; right:12px; top:50%; transform:translateY(-50%); color:var(--muted); cursor:pointer; font-size:12px; transition:0.2s; }
        .pass-eye:hover { color:var(--accent); }

        .btn-submit {
            width:100%; padding:12px;
            background:var(--accent); color:#000;
            border:none; border-radius:7px;
            font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:0.5px;
            cursor:pointer; transition:0.2s; margin-top:4px;
            display:flex; align-items:center; justify-content:center; gap:8px;
        }
        .btn-submit:hover { background:#00ffb3; }
        .btn-submit:disabled { opacity:0.5; cursor:not-allowed; }

        .card-footer { margin-top:18px; border-top:1px solid var(--border); padding-top:14px; text-align:center; }
        .card-footer span { font-family:var(--mono); font-size:10px; color:var(--muted); }
        .card-footer a { color:var(--accent); text-decoration:none; font-weight:600; }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="card">
        <div class="card-header">
            <div class="sys-label">ABHINAV SECURE ACCESS</div>
            <h1>Authentication</h1>
            <div class="sub">// Enter credentials to continue</div>
        </div>

        <form id="authForm" onsubmit="handleAuth(event)">
            <div class="field">
                <label>Identifier</label>
                <input type="text" name="email" placeholder="email or username" required autocomplete="username">
            </div>
            <div class="field">
                <label>Password</label>
                <div class="pass-wrap">
                    <input type="password" name="password" id="passInput" placeholder="••••••••••" required>
                    <i class="fas fa-eye-slash pass-eye" onclick="togglePass()"></i>
                </div>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">
                <span>AUTHENTICATE</span>
                <i class="fas fa-arrow-right" style="font-size:11px;"></i>
            </button>
        </form>

        <div class="card-footer">
            <span>No account? <a href="/signup">Request access</a></span>
        </div>
    </div>

    <script>
        function togglePass() {
            const i = document.getElementById('passInput');
            const e = document.querySelector('.pass-eye');
            i.type = i.type === 'password' ? 'text' : 'password';
            e.classList.toggle('fa-eye'); e.classList.toggle('fa-eye-slash');
        }
        async function handleAuth(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const span = btn.querySelector('span');
            btn.disabled = true; span.textContent = 'VERIFYING...';
            try {
                const res = await fetch('/login', { method:'POST', body: new FormData(e.target) });
                const d = await res.json();
                if(res.status === 200) {
                    span.textContent = 'ACCESS GRANTED'; setTimeout(() => window.location.href = d.url, 600);
                } else if(res.status === 403) {
                    Swal.fire({ icon:'error', title:'Access Denied', text:d.msg, background:'#0a0a0f', color:'#c9d1d9', confirmButtonColor:'#00e5a0' });
                    reset();
                } else {
                    Swal.fire({ icon:'warning', title:'Auth Failed', text:d.msg || 'Invalid credentials.', background:'#0a0a0f', color:'#c9d1d9', confirmButtonColor:'#00e5a0' });
                    reset();
                }
            } catch { reset(); }
            function reset() { btn.disabled = false; span.textContent = 'AUTHENTICATE'; }
        }
    </script>
</body>
</html>
