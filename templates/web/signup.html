<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=0">
    <title>Register — Abhinav Hosting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg:#010103; --surface:#0a0a0f; --accent:#00e5a0;
            --accent-dim:rgba(0,229,160,0.1); --accent-border:rgba(0,229,160,0.22);
            --border:rgba(255,255,255,0.06); --muted:#4a5568; --text:#c9d1d9;
            --mono:'JetBrains Mono',monospace;
        }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body {
            font-family:'Space Grotesk',sans-serif; background:var(--bg);
            min-height:100dvh; display:flex; align-items:center; justify-content:center;
            color:var(--text); position:relative; overflow:hidden; padding:20px 0;
        }
        body::before { content:''; position:fixed; inset:0; z-index:0; pointer-events:none; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px); }
        body::after  { content:''; position:fixed; inset:0; z-index:0; pointer-events:none; background-image:linear-gradient(rgba(0,229,160,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.025) 1px,transparent 1px); background-size:40px 40px; }
        .glow { position:fixed; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle,rgba(0,229,160,0.05) 0%,transparent 70%); bottom:-150px; left:-150px; pointer-events:none; z-index:0; }

        .card {
            position:relative; z-index:10;
            width:92%; max-width:380px;
            background:var(--surface); border:1px solid var(--border);
            border-radius:12px; padding:28px 22px;
            box-shadow:0 0 60px rgba(0,0,0,0.8);
        }
        .card-header { margin-bottom:20px; }
        .sys-label { font-family:var(--mono); font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
        .sys-label::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--accent); display:inline-block; animation:blink 2s infinite; }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
        h1 { font-family:var(--mono); font-size:17px; font-weight:700; color:#fff; }
        .sub { font-family:var(--mono); font-size:10px; color:var(--muted); margin-top:3px; }

        .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .field { margin-bottom:11px; }
        .field label { font-family:var(--mono); font-size:9px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; display:block; margin-bottom:5px; }
        .field input {
            width:100%; padding:10px 12px;
            background:rgba(255,255,255,0.03); border:1px solid var(--border);
            border-radius:7px; color:var(--text); font-size:13px; font-family:var(--mono);
            outline:none; transition:0.2s;
        }
        .field input::placeholder { color:var(--muted); }
        .field input:focus { border-color:var(--accent-border); background:rgba(0,229,160,0.04); box-shadow:0 0 0 3px rgba(0,229,160,0.08); }

        .file-zone {
            background:rgba(255,255,255,0.02); border:1px dashed rgba(0,229,160,0.2);
            border-radius:7px; padding:11px; text-align:center;
            cursor:pointer; transition:0.2s; font-family:var(--mono); font-size:11px; color:var(--muted);
        }
        .file-zone:hover { border-color:var(--accent-border); color:var(--accent); }

        .btn-submit {
            width:100%; padding:11px;
            background:var(--accent); color:#000;
            border:none; border-radius:7px;
            font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:0.5px;
            cursor:pointer; transition:0.2s; margin-top:4px;
            display:flex; align-items:center; justify-content:center; gap:8px;
        }
        .btn-submit:hover { background:#00ffb3; }
        .btn-submit:disabled { opacity:0.5; cursor:not-allowed; }
        .card-footer { margin-top:14px; border-top:1px solid var(--border); padding-top:12px; text-align:center; }
        .card-footer span { font-family:var(--mono); font-size:10px; color:var(--muted); }
        .card-footer a { color:var(--accent); text-decoration:none; font-weight:600; }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="card">
        <div class="card-header">
            <div class="sys-label">ABHINAV ACCESS REQUEST</div>
            <h1>New Account</h1>
            <div class="sub">// Fill all fields to register</div>
        </div>

        <form id="signupForm" enctype="multipart/form-data">
            <div class="row2">
                <div class="field"><label>First Name</label><input type="text" name="fname" placeholder="John" required></div>
                <div class="field"><label>Last Name</label><input type="text" name="lname" placeholder="Doe" required></div>
            </div>
            <div class="field"><label>Username</label><input type="text" name="username" placeholder="johndoe99" required></div>
            <div class="field"><label>Email</label><input type="email" name="email" placeholder="name@example.com" required></div>
            <div class="row2">
                <div class="field"><label>Password</label><input type="password" name="password" placeholder="••••••••" required></div>
                <div class="field"><label>Confirm</label><input type="password" name="confirm_password" placeholder="••••••••" required></div>
            </div>
            <div class="field">
                <label>Avatar <span style="color:#2d3748;">(optional)</span></label>
                <input type="file" name="pfp" id="pfp" style="display:none;" onchange="updateFile(this)">
                <div class="file-zone" onclick="document.getElementById('pfp').click()" id="fileLbl">
                    <i class="fas fa-upload" style="font-size:11px;margin-right:5px;"></i> upload photo
                </div>
            </div>
            <button type="submit" class="btn-submit" id="submitBtn">
                <span>REGISTER</span><i class="fas fa-arrow-right" style="font-size:11px;"></i>
            </button>
        </form>
        <div class="card-footer">
            <span>Have an account? <a href="/login">Sign in</a></span>
        </div>
    </div>

    <script>
        function updateFile(i) {
            if(i.files.length) document.getElementById('fileLbl').innerHTML = `<i class="fas fa-check" style="color:#00e5a0;margin-right:5px;"></i>${i.files[0].name}`;
        }
        document.getElementById('signupForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const span = btn.querySelector('span');
            btn.disabled = true; span.textContent = 'PROCESSING...';
            try {
                const res = await fetch('/signup', { method:'POST', body: new FormData(e.target) });
                const d = await res.json();
                if(d.status === 'success') {
                    Swal.fire({ title:'Access Granted', text:'Account created.', icon:'success', background:'#0a0a0f', color:'#c9d1d9', confirmButtonColor:'#00e5a0' })
                    .then(() => window.location.href = d.url);
                } else {
                    Swal.fire({ title:'Error', text:d.msg, icon:'error', background:'#0a0a0f', color:'#c9d1d9', confirmButtonColor:'#00e5a0' });
                    btn.disabled = false; span.textContent = 'REGISTER';
                }
            } catch { btn.disabled = false; span.textContent = 'REGISTER'; }
        };
    </script>
</body>
</html>
